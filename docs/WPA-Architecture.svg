<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="1200" height="850">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0F62FE"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#198754"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6E32C9"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="850" fill="#FAFBFF"/>
  
  <!-- Title -->
  <text x="30" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1A376C">Workforce Planning Agent — Platform Architecture</text>
  <text x="30" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#525252">Four bounded regions with HTTP POST API, role-scoped data isolation, deployed on SAP BTP Cloud Foundry (us10-001)</text>
  
  <!-- ═══ REGION: Presentation Layer ═══ -->
  <rect x="20" y="75" width="380" height="290" rx="8" fill="#EFF4FF" stroke="#0F62FE" stroke-width="2" filter="url(#shadow)"/>
  <text x="35" y="98" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#0F62FE">Presentation Layer</text>
  <text x="35" y="113" font-family="system-ui, sans-serif" font-size="9" fill="#666">React 18 + Vite + UI5 Web Components for React v2.23.1</text>
  
  <!-- Auth box -->
  <rect x="35" y="125" width="160" height="50" rx="5" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
  <text x="115" y="145" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">AuthContext.tsx</text>
  <text x="115" y="162" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">useAuth() → role, employee_id, dept</text>
  
  <!-- Mock Login -->
  <rect x="210" y="125" width="100" height="50" rx="5" fill="#fff" stroke="#9673A6"/>
  <text x="260" y="148" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">Mock Login</text>
  <text x="260" y="162" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">3 demo buttons</text>
  
  <!-- Dashboard -->
  <rect x="35" y="185" width="275" height="30" rx="5" fill="#fff" stroke="#0F62FE" stroke-width="1.5"/>
  <text x="172" y="205" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1A376C" text-anchor="middle">Dashboard.tsx — Workforce Agent Tab</text>
  
  <!-- Scenario Chips -->
  <rect x="35" y="225" width="100" height="65" rx="4" fill="#D5E8D4" stroke="#82B366"/>
  <text x="85" y="242" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">Employee</text>
  <text x="85" y="255" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">career_ai</text>
  <text x="85" y="266" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">career_transition</text>
  <text x="85" y="277" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">skill_gap</text>
  
  <rect x="145" y="225" width="100" height="65" rx="4" fill="#FFF2CC" stroke="#D6B656"/>
  <text x="195" y="242" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">Manager</text>
  <text x="195" y="255" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">team_capacity</text>
  <text x="195" y="266" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">succession</text>
  <text x="195" y="277" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">automation_opp</text>
  
  <rect x="255" y="225" width="100" height="65" rx="4" fill="#F8CECC" stroke="#B85450"/>
  <text x="305" y="242" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">Executive</text>
  <text x="305" y="255" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">org_transformation</text>
  <text x="305" y="266" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">cost_optimisation</text>
  <text x="305" y="277" font-family="monospace" font-size="7" fill="#555" text-anchor="middle">talent_strategy</text>
  
  <!-- Results Panel -->
  <rect x="35" y="300" width="275" height="30" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="172" y="320" font-family="system-ui, sans-serif" font-size="9" fill="#333" text-anchor="middle">Results: BBRA Cards + Cost Summary + Assessments</text>
  
  <!-- ═══ REGION: API Layer ═══ -->
  <rect x="430" y="75" width="360" height="290" rx="8" fill="#FFF0E6" stroke="#ED8936" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="98" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#D26900">API Layer (FastAPI)</text>
  <text x="445" y="113" font-family="system-ui, sans-serif" font-size="9" fill="#666">FastAPI 0.115 + Uvicorn 0.30 + Pydantic v2.9 · Python 3.12</text>
  
  <!-- main.py -->
  <rect x="445" y="125" width="155" height="40" rx="5" fill="#fff" stroke="#ED8936" stroke-width="1.5"/>
  <text x="522" y="145" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1A376C" text-anchor="middle">main.py</text>
  <text x="522" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">ASGI Application</text>
  
  <!-- Static Files -->
  <rect x="615" y="125" width="130" height="40" rx="5" fill="#fff" stroke="#ccc"/>
  <text x="680" y="145" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">StaticFiles</text>
  <text x="680" y="158" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">/static/* → React SPA</text>
  
  <!-- POST /api/analyze -->
  <rect x="445" y="180" width="300" height="28" rx="4" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.5"/>
  <text x="595" y="199" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1A376C" text-anchor="middle">POST /api/analyze</text>
  
  <!-- Request body -->
  <rect x="445" y="220" width="175" height="100" rx="4" fill="#fff" stroke="#ED8936"/>
  <text x="455" y="236" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333">ScenarioRequest</text>
  <text x="455" y="252" font-family="monospace" font-size="8" fill="#555">scenario: str</text>
  <text x="455" y="264" font-family="monospace" font-size="8" fill="#555">scenario_type: str (9 keys)</text>
  <text x="455" y="276" font-family="monospace" font-size="8" fill="#555">user_role: enum</text>
  <text x="455" y="288" font-family="monospace" font-size="8" fill="#555">employee_id: str</text>
  <text x="455" y="300" font-family="monospace" font-size="8" fill="#555">department: str</text>
  
  <!-- Response -->
  <rect x="635" y="220" width="130" height="100" rx="4" fill="#fff" stroke="#ED8936"/>
  <text x="645" y="236" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333">Response</text>
  <text x="645" y="252" font-family="monospace" font-size="8" fill="#555">strategy: {...}</text>
  <text x="645" y="264" font-family="monospace" font-size="8" fill="#555">gap_analysis: {...}</text>
  <text x="645" y="276" font-family="monospace" font-size="8" fill="#555">recommendations: [...]</text>
  <text x="645" y="288" font-family="monospace" font-size="8" fill="#555">cost_summary: {...}</text>
  <text x="645" y="300" font-family="monospace" font-size="8" fill="#555">assessments: [...]</text>
  
  <!-- CORS -->
  <rect x="445" y="335" width="80" height="18" rx="3" fill="#fff" stroke="#ccc"/>
  <text x="485" y="348" font-family="system-ui, sans-serif" font-size="7" fill="#999" text-anchor="middle">CORS (AllowAll)</text>
  
  <!-- ═══ REGION: Agent Engine ═══ -->
  <rect x="20" y="400" width="380" height="310" rx="8" fill="#F0FFF4" stroke="#198754" stroke-width="2" filter="url(#shadow)"/>
  <text x="35" y="423" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#198754">Agent Engine</text>
  <text x="35" y="438" font-family="system-ui, sans-serif" font-size="9" fill="#666">engine.py — Pure Python, deterministic processing</text>
  
  <!-- parse_strategy -->
  <rect x="35" y="450" width="230" height="50" rx="5" fill="#fff" stroke="#198754" stroke-width="1.5"/>
  <text x="150" y="468" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">parse_strategy(scenario_text, scenario_type)</text>
  <text x="150" y="485" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">9 named fast-paths → roles_to_grow, roles_to_reduce, skill_targets</text>
  
  <!-- run_agent -->
  <rect x="35" y="510" width="230" height="50" rx="5" fill="#fff" stroke="#198754" stroke-width="1.5"/>
  <text x="150" y="528" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">run_agent(scenario, type, role, emp_id, dept)</text>
  <text x="150" y="545" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Gap analysis → BBRA recommendations → Cost modeling</text>
  
  <!-- Scope Filter -->
  <rect x="35" y="575" width="230" height="55" rx="5" fill="#E1D5E7" stroke="#9673A6" stroke-width="1.5"/>
  <text x="150" y="593" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#333" text-anchor="middle">Scope Filter (post-process)</text>
  <text x="150" y="607" font-family="system-ui, sans-serif" font-size="8" fill="#555" text-anchor="middle">employee → own row (1) | manager → team (manager_id)</text>
  <text x="150" y="620" font-family="system-ui, sans-serif" font-size="8" fill="#555" text-anchor="middle">executive → all (150 records)</text>
  
  <!-- BBRA + Cost -->
  <rect x="35" y="645" width="130" height="35" rx="4" fill="#FFF8F0" stroke="#D26900"/>
  <text x="100" y="660" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">BBRA Framework</text>
  <text x="100" y="672" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle">Build · Buy · Reskill · Automate</text>
  
  <rect x="175" y="645" width="130" height="35" rx="4" fill="#FFF8F0" stroke="#D26900"/>
  <text x="240" y="660" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">Cost Engine</text>
  <text x="240" y="672" font-family="system-ui, sans-serif" font-size="7" fill="#666" text-anchor="middle">Salary + Training + Severance</text>
  
  <!-- ═══ REGION: Data Layer ═══ -->
  <rect x="430" y="400" width="360" height="160" rx="8" fill="#FCE4EC" stroke="#B85450" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="423" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#B85450">Data Layer</text>
  <text x="445" y="438" font-family="system-ui, sans-serif" font-size="9" fill="#666">Bundled CSV + JSON (stateless, resets on restage)</text>
  
  <!-- employees.csv -->
  <rect x="445" y="450" width="145" height="55" rx="5" fill="#fff" stroke="#B85450" stroke-width="1.5"/>
  <text x="517" y="468" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">employees.csv</text>
  <text x="517" y="482" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">150 records · 3 departments</text>
  <text x="517" y="494" font-family="monospace" font-size="7" fill="#999" text-anchor="middle">employee_id · manager_id · skills</text>
  
  <!-- future_roles.json -->
  <rect x="605" y="450" width="130" height="55" rx="5" fill="#fff" stroke="#B85450" stroke-width="1.5"/>
  <text x="670" y="468" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">future_roles.json</text>
  <text x="670" y="482" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Role definitions</text>
  <text x="670" y="494" font-family="monospace" font-size="7" fill="#999" text-anchor="middle">priorities · skill requirements</text>
  
  <!-- Salary Bands -->
  <rect x="445" y="515" width="120" height="30" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="505" y="534" font-family="system-ui, sans-serif" font-size="8" fill="#333" text-anchor="middle">Salary Bands (grade-based)</text>
  
  <!-- Dept data -->
  <rect x="580" y="515" width="155" height="30" rx="4" fill="#fff" stroke="#ccc"/>
  <text x="657" y="534" font-family="system-ui, sans-serif" font-size="8" fill="#333" text-anchor="middle">Depts: Tech 57 · Fin 48 · Ops 45</text>
  
  <!-- ═══ REGION: Deployment ═══ -->
  <rect x="430" y="590" width="360" height="120" rx="8" fill="#F8F0FF" stroke="#6E32C9" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="613" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#6E32C9">SAP BTP Cloud Foundry</text>
  <text x="445" y="628" font-family="system-ui, sans-serif" font-size="9" fill="#666">Region: us10-001 · Org: 8035567atrial · Space: dev</text>
  
  <rect x="445" y="640" width="210" height="45" rx="5" fill="#fff" stroke="#6E32C9" stroke-width="1.5"/>
  <text x="550" y="658" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#333" text-anchor="middle">workforce-planning-agent</text>
  <text x="550" y="672" font-family="system-ui, sans-serif" font-size="8" fill="#666" text-anchor="middle">Python Buildpack 1.9.0 · cflinuxfs4 · 256MB · 1 inst</text>
  
  <rect x="670" y="645" width="100" height="35" rx="4" fill="#E8F5E9" stroke="#198754"/>
  <text x="720" y="661" font-family="system-ui, sans-serif" font-size="7" font-weight="bold" fill="#198754" text-anchor="middle">LIVE URL</text>
  <text x="720" y="673" font-family="monospace" font-size="6" fill="#198754" text-anchor="middle">.cfapps.us10-001</text>
  
  <!-- ═══ CONNECTIONS ═══ -->
  <!-- UI → API (HTTP POST) -->
  <line x1="400" y1="200" x2="445" y2="194" stroke="#0F62FE" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="415" y="185" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#0F62FE" transform="rotate(-5,415,185)">HTTP POST</text>
  
  <!-- API → Engine (calls) -->
  <path d="M 445 320 L 400 320 L 400 360 L 150 360 L 150 450" fill="none" stroke="#198754" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="300" y="352" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#198754">calls run_agent()</text>
  
  <!-- Engine → Data (reads) -->
  <line x1="265" y1="535" x2="445" y2="477" stroke="#B85450" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="340" y="498" font-family="system-ui, sans-serif" font-size="8" fill="#B85450">reads CSV/JSON</text>
  
  <!-- Engine → UI (response) -->
  <path d="M 35 600 L 15 600 L 15 315 L 35 315" fill="none" stroke="#6E32C9" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrow-purple)"/>
  <text x="5" y="460" font-family="system-ui, sans-serif" font-size="8" font-weight="bold" fill="#6E32C9" transform="rotate(-90,15,460)">JSON Response (scope-filtered)</text>
  
  <!-- API → Deploy -->
  <line x1="610" y1="365" x2="610" y2="590" stroke="#6E32C9" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="617" y="550" font-family="system-ui, sans-serif" font-size="7" fill="#6E32C9">cf push</text>
  
  <!-- ═══ LEGEND ═══ -->
  <rect x="840" y="75" width="340" height="260" rx="6" fill="#F8FAFF" stroke="#ccc"/>
  <text x="860" y="98" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1A376C">Connection Protocols</text>
  <line x1="860" y1="112" x2="920" y2="112" stroke="#0F62FE" stroke-width="2.5"/>
  <text x="930" y="116" font-family="system-ui, sans-serif" font-size="9" fill="#333">HTTP POST (request)</text>
  <line x1="860" y1="132" x2="920" y2="132" stroke="#6E32C9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="930" y="136" font-family="system-ui, sans-serif" font-size="9" fill="#333">JSON Response (filtered)</text>
  <line x1="860" y1="152" x2="920" y2="152" stroke="#B85450" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="930" y="156" font-family="system-ui, sans-serif" font-size="9" fill="#333">Data reads (CSV/JSON)</text>
  <line x1="860" y1="172" x2="920" y2="172" stroke="#198754" stroke-width="2"/>
  <text x="930" y="176" font-family="system-ui, sans-serif" font-size="9" fill="#333">Internal function call</text>
  
  <text x="860" y="205" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1A376C">Data Scope by Role</text>
  <circle cx="870" cy="222" r="5" fill="#82B366"/>
  <text x="882" y="226" font-family="system-ui, sans-serif" font-size="9" fill="#333">Employee → own record (1 row)</text>
  <circle cx="870" cy="242" r="5" fill="#D6B656"/>
  <text x="882" y="246" font-family="system-ui, sans-serif" font-size="9" fill="#333">Manager → team (manager_id match)</text>
  <circle cx="870" cy="262" r="5" fill="#B85450"/>
  <text x="882" y="266" font-family="system-ui, sans-serif" font-size="9" fill="#333">Executive → all 150 records</text>
  
  <text x="860" y="295" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1A376C">Key Design Decisions</text>
  <text x="860" y="312" font-family="system-ui, sans-serif" font-size="8" fill="#555">• Scope filter in backend (not frontend)</text>
  <text x="860" y="324" font-family="system-ui, sans-serif" font-size="8" fill="#555">• Gap analysis runs on full org pre-filter</text>
  <text x="860" y="336" font-family="system-ui, sans-serif" font-size="8" fill="#555">• 9 deterministic fast-paths (no LLM needed)</text>
  
  <!-- Stack bar -->
  <text x="30" y="740" font-family="system-ui, sans-serif" font-size="10" fill="#525252"><tspan font-weight="bold">Stack:</tspan> Python 3.12 · FastAPI · React 18 · Vite · UI5 Web Components · Pydantic v2 · Cloud Foundry</text>
  <text x="30" y="758" font-family="system-ui, sans-serif" font-size="10" fill="#0F62FE"><tspan font-weight="bold">Live URL:</tspan> https://workforce-planning-agent.cfapps.us10-001.hana.ondemand.com/</text>
</svg>